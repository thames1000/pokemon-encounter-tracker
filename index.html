<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#101a2b" />
  <meta name="description" content="Shiny hunt encounter counter — track your encounters per target Pokemon." />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Shiny Hunt Counter</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Shiny Hunt Counter</h1>
    <button id="install-btn" class="install-btn" hidden>Install</button>
  </header>

  <main class="app-main">
    <!-- Active hunt -->
    <section class="card hunt-card">
      <figure class="target">
        <img id="sprite" alt="Target shiny sprite" />
        <figcaption id="target-name">No target selected</figcaption>
      </figure>

      <div class="counter-block">
        <div class="counter-label">Encounters</div>
        <div id="counter" class="counter-value">0</div>
        <div id="odds-line" class="odds-line"></div>
      </div>

      <!-- Giant tap target: tap the sprite/counter area or press Space to +1 -->
      <button id="increment" class="increment-btn">+1 Encounter</button>

      <div class="controls">
        <button id="decrement" class="ctrl-btn" title="Subtract one (mistake)">−1</button>
        <button id="set-btn" class="ctrl-btn">Set</button>
        <button id="reset-btn" class="ctrl-btn">Reset</button>
        <button id="found-btn" class="ctrl-btn good">★ Found!</button>
      </div>
    </section>

    <!-- Target selection -->
    <section class="card">
      <h2>Target</h2>
      <label class="field">
        <span>Dex number or name</span>
        <input id="target-input" list="species-list" placeholder="e.g. 258 or mudkip" autocomplete="off" />
        <datalist id="species-list"></datalist>
      </label>
      <div class="grid-2">
        <label class="field">
          <span>Odds (1 in …)</span>
          <select id="odds-preset">
            <option value="8192">Gen II–IV — 1/8192</option>
            <option value="4096" selected>Gen VI+ — 1/4096</option>
            <option value="2731">Charm (full) — 1/2731</option>
            <option value="1365">Masuda + Charm — 1/1365</option>
            <option value="683">Full odds chains — 1/683</option>
            <option value="custom">Custom…</option>
          </select>
        </label>
        <label class="field" id="custom-odds-field" hidden>
          <span>Custom odds (1 in …)</span>
          <input id="custom-odds" type="number" inputmode="numeric" min="1" value="4096" />
        </label>
      </div>
      <button id="load-btn" class="ghost-btn">Load / switch target</button>
    </section>

    <!-- Saved hunts -->
    <section class="card">
      <h2>Your hunts</h2>
      <ul id="hunt-list" class="hunt-list"></ul>
      <p id="no-hunts" class="muted-note">No saved hunts yet. Load a target above to start.</p>
    </section>

    <!-- Data: import/export keeps it in sync with the desktop app's hunt_log.json -->
    <section class="card">
      <h2>Data</h2>
      <div class="controls">
        <button id="export-btn" class="ctrl-btn">Export</button>
        <button id="import-btn" class="ctrl-btn">Import</button>
      </div>
      <input id="import-file" type="file" accept="application/json,.json" hidden />
      <p class="muted-note">Export/import a <code>hunt_log.json</code> compatible with the desktop counter. Progress is saved automatically in this browser.</p>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
